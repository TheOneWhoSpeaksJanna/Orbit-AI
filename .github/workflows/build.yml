name: Android Build

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --build-cache --parallel

      - name: Prepare versioned APK
        id: apk
        run: |
          mkdir -p dist
          APK_NAME="orbis-ai-debug-${{ github.run_number }}.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "dist/$APK_NAME"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbis-ai-debug-${{ github.run_number }}
          path: dist/${{ steps.apk.outputs.apk_name }}
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Orbis AI Debug #${{ github.run_number }}
          files: dist/${{ steps.apk.outputs.apk_name }}