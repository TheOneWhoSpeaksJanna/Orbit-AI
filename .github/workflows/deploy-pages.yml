name: Deploy plugins to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/build.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Prepare plugin dist
        run: |
          # Copy hidden-channels plugin files to Pages root
          mkdir -p dist
          cp plugins/hidden-channels/manifest.json dist/
          cp plugins/hidden-channels/index.js dist/
          cp plugins/hidden-channels/.nojekyll dist/ 2>/dev/null || true
          echo "Files at root:"
          ls -la dist/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
