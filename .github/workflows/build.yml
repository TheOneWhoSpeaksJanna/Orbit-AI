name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Android SDK
      id: cache-android-sdk
      uses: actions/cache@v4
      with:
        path: |
          $ANDROID_HOME/platforms/android-36
          $ANDROID_HOME/build-tools/36.0.0
        key: android-sdk-${{ runner.os }}

    - name: Install Android SDK components
      if: steps.cache-android-sdk.outputs.cache-hit != 'true'
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-36" "build-tools;36.0.0"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: ${{ github.event_name != 'push' }}

    - name: Build with Gradle
      run: ./gradlew assembleDebug --no-daemon

    - name: Collect all flavor APKs
      run: |
        mkdir -p release
        # Find all debug APKs across flavor directories
        for apk in app/build/outputs/apk/*/debug/*.apk; do
          flavor=$(basename "$(dirname "$(dirname "$apk")")")
          cp "$apk" "release/orbit-ai-${flavor}-debug-${{ github.run_number }}.apk"
        done
        # Fallback for flat layout (no flavors)
        if [ ! "$(ls -A release 2>/dev/null)" ]; then
          cp app/build/outputs/apk/debug/*.apk release/ 2>/dev/null || true
        fi
        ls -la release/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: orbit-ai-apks-${{ github.run_number }}
        path: release/*.apk

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: orbit-ai-apks-${{ github.run_number }}
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Orbit AI ${{ github.ref_name }}
          files: "*.apk"
