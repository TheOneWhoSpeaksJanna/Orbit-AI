name: Build and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug --parallel --build-cache

    - name: Rename APK
      run: |
        mkdir -p release
        mv app/build/outputs/apk/debug/app-debug.apk release/orbit-ai-debug-${{ github.run_number }}.apk

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: orbit-ai-debug-${{ github.run_number }}
        path: release/orbit-ai-debug-${{ github.run_number }}.apk

    - name: Create GitHub Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: Orbit AI Build #${{ github.run_number }}
        files: release/orbit-ai-debug-${{ github.run_number }}.apk
