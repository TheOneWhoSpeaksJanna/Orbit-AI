name: Deploy plugins to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - plugins/**
      - .github/workflows/deploy-pages.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Prepare plugin dist
        run: |
          mkdir -p dist
          for plugin in plugins/*/; do
            name=$(basename "$plugin")
            echo "Preparing: $name"
            mkdir -p "dist/$name"
            [ -f "$plugin/manifest.json" ] && cp "$plugin/manifest.json" "dist/$name/"
            [ -f "$plugin/index.js" ] && cp "$plugin/index.js" "dist/$name/"
            [ -f "$plugin/dist/index.js" ] && cp "$plugin/dist/index.js" "dist/$name/"
          done
          find dist -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
